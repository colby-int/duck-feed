server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    # API proxy
    location /api/ {
        set $api_upstream http://server:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE endpoint — disable buffering
    location /api/stream/events {
        set $api_upstream http://server:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Icecast stream proxy
    location /stream {
        set $icecast_upstream http://icecast:8000;
        proxy_pass $icecast_upstream/stream;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Client app
    location / {
        set $client_upstream http://client:80;
        proxy_pass $client_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
